name: Tests

on:
  push:
  pull_request:

jobs:
  checks:
    name: Consistency and security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: |
          node --check src/stickers.js
          node --check src/content.js

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')); console.log('manifest ok')"

      - name: Check sticker consistency
        run: node tests/sticker-consistency.test.js

      - name: Check content behavior
        run: node tests/content-behavior.test.js

      - name: Check project security
        run: node tests/security.test.js
